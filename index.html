        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* OTP Boxes */
        .otp-box {
            width: 45px; height: 60px; text-align: center; font-size: 28px; font-weight: 800;
            border: 2px solid #e2e8f0; border-radius: 16px; background: #ffffff; transition: all 0.2s;
        }
        .otp-box:focus { border-color: #ff6600; outline: none; box-shadow: 0 0 0 4px rgba(255, 102, 0, 0.1); }
        
        .btn-action {
            background: linear-gradient(135deg, #ff6600 0%, #ff8c33 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(255, 102, 0, 0.4); }
        .btn-action:active { transform: translateY(0); scale: 0.98; }

        .custom-scrollbar::-webkit-scrollbar { height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

        let generatedOTP = "";
        let currentRef = "";
        let currentUserResults = [];

        window.onload = function() {
            const savedId = localStorage.getItem('moranasatect_session');
            if (savedId) {
                currentUserResults = database.filter(item => item.id === savedId);
                if (currentUserResults.length > 0) { renderDashboard(); showStep(3); } else { showStep(1); }
            } else { showStep(1); }
            setTimeout(() => document.getElementById('sessionLoading').classList.add('hidden'), 600);
            setupOtpInputs();
            setupEnterKeys();
        };

        function setupEnterKeys() {
            document.getElementById('studentIdInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });
        }

        function setupOtpInputs() {
            const boxes = document.querySelectorAll('.otp-box');
            boxes.forEach((box, i) => {
                box.oninput = (e) => {
                    const val = e.target.value;
                    if (!/^\d*$/.test(val)) { e.target.value = ""; return; }
                    if (val && i < 5) boxes[i+1].focus();
                    if (Array.from(boxes).every(b => b.value !== "")) {
                        // All boxes filled, ready for verification
                    }
                };
                box.onkeydown = (e) => { 
                    if (e.key === 'Backspace' && !box.value && i > 0) boxes[i-1].focus();
                    if (e.key === 'Enter') handleVerify(); // ยืนยัน OTP เมื่อกด Enter
                };
            });
        }

        function showStep(s) {
            document.querySelectorAll('#step1, #step2, #step3').forEach(el => el.classList.add('hidden'));
            document.getElementById('step'+s).classList.remove('hidden');
            if (s === 1) {
                document.getElementById('studentIdInput').value = "";
                document.querySelectorAll('.otp-box').forEach(b => b.value = "");
            }
        }

        async function handleLogin() {
            const id = document.getElementById('studentIdInput').value.trim();
            currentUserResults = database.filter(item => item.id === id);
            if (currentUserResults.length === 0) { 
                document.getElementById('error1').classList.remove('hidden'); 
                shakeElement(document.getElementById('step1'));
                return; 
            }

            document.getElementById('error1').classList.add('hidden');
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            currentRef = Math.random().toString(36).substring(2, 6).toUpperCase();
            
            const btn = document.getElementById('loginBtn');
            const load = document.getElementById('loginLoading');
            btn.disabled = true; load.classList.remove('hidden');

            try {
                await fetch(GAS_WEB_APP_URL, {
                    method: 'POST', mode: 'no-cors', cache: 'no-cache',
                    body: JSON.stringify({ 
                        studentId: id, 
                        otpCode: generatedOTP, 
                        refCode: currentRef 
                    })
                });
                document.getElementById('targetEmail').innerText = id + "@kmitl.ac.th";
                document.getElementById('displayRef').innerText = currentRef;
                showStep(2);
                setTimeout(() => document.querySelectorAll('.otp-box')[0].focus(), 400);
            } catch (e) { alert("เกิดข้อผิดพลาดในการส่งอีเมล กรุณาตรวจสอบการเชื่อมต่อ"); }
            finally { btn.disabled = false; load.classList.add('hidden'); }
        }

        function handleVerify() {
            const code = Array.from(document.querySelectorAll('.otp-box')).map(b => b.value).join('');
            if (code === generatedOTP) {
                localStorage.setItem('moranasatect_session', currentUserResults[0].id);
                renderDashboard(); showStep(3);
            } else { 
                document.getElementById('error2').classList.remove('hidden');
                shakeElement(document.getElementById('otpGroup'));
            }
        }

        function shakeElement(el) {
            el.classList.add('translate-x-1');
            setTimeout(() => el.classList.remove('translate-x-1'), 100);
        }

        function handleLogout() { localStorage.removeItem('moranasatect_session'); showStep(1); }

        function renderDashboard() {
            const first = currentUserResults[0];
            document.getElementById('resId').innerText = 'ID: ' + first.id;
            document.getElementById('resName').innerText = first.name;
            const container = document.getElementById('driveLinksContainer');
            container.innerHTML = '';
            
            currentUserResults.forEach(item => {
                if (item.status === "เสร็จสิ้น") {
                    const a = document.createElement('a');
                    a.href = item.drive; a.target = "_blank";
                    a.className = "flex items-center justify-between p-6 bg-white rounded-[2rem] border border-slate-100 shadow-md hover:border-orange-200 transition-all group scale-100 active:scale-95 mb-4";
                    a.innerHTML = `
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-main group-hover:bg-orange-main group-hover:text-white transition-all shadow-inner">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            </div>
                            <div class="text-left">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-0.5">Your Photo Link</p>
                                <p class="text-xl font-extrabold leading-tight text-slate-800">รูปถ่ายคิว ${item.q}</p>
                            </div>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-2xl group-hover:bg-orange-main group-hover:text-white transition-colors text-slate-300">
                             <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                        </div>
                    `;
                    container.appendChild(a);
                }
            });

            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';
            currentUserResults.forEach(item => {
                const tr = document.createElement('tr');
                const isCancelled = item.status === 'ยกเลิก';
                tr.className = "hover:bg-slate-50/80 transition-colors";
                tr.innerHTML = `
                    <td class="px-8 py-6 font-bold text-slate-800">${item.q}</td>
                    <td class="px-8 py-6 text-center">
                        <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${isCancelled ? 'bg-red-50 text-red-500 border border-red-100' : 'bg-green-50 text-green-600 border border-green-100'}">
                            ${item.status}
                        </span>
                    </td>
                    <td class="px-8 py-6 text-[12px] text-slate-400">${item.booked}</td>
                    <td class="px-8 py-6 text-right font-mono font-bold text-orange-main">${item.duration}${item.duration !== '-' ? 's' : ''}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
